url: https://jmgirard.github.io/hitop/

home:
  title: Tools for the HiTOP Society

authors:
  Jeffrey Girard:
    href: https://affcom.ku.edu/girard

template:
  bootstrap: 5
  math-rendering: mathjax
  light-switch: true

navbar:
  structure:
    left:  [downloads, articles, reference, news]
    right: [search, github, lightswitch]
  components:
    downloads:
      text: "Instruments"
      menu:
      - text: "HiTOP Self Report (SR)"
