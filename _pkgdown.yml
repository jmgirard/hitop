      - text: "PID-5 Full (PID-5)"
        href: articles/download-pid5.html
      - text: "PID-5 Short Form (SF)"
        href: articles/download-pid5sf.html
      - text: "PID-5 Brief Form (BF)"
        href: articles/download-pid5bf.html
    articles:
      text: "Tutorials"
      menu:
      - text: "Scoring HiTOP-SR"
        href: articles/hitopsr_scoring.html
      - text: "Scoring HiTOP-BR"
        href: articles/hitopbr_scoring.html
      - text: "Scoring PID-5"
        href: articles/pid5_scoring.html
      - text: "Scoring PID-5-SF"
        href: articles/pid5sf_scoring.html
      - text: "Scoring PID-5-BF"
        href: articles/pid5bf_scoring.html

